spring:
  application:
    name: wedu-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/wedu?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 운영/통합 환경은 validate 권장. 로컬 초기 개발은 환경변수로 update 로 덮어 쓴다.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # --- 소셜 로그인(OAuth2) ---
  # 실제 client-id/secret 은 커밋하지 않는다. 아래 템플릿을 참고해 환경변수 또는
  # application-secret.yml(gitignore) 로 주입하고, 준비되면 주석을 해제한다.
  #
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         kakao:
  #           client-id: ${KAKAO_CLIENT_ID}
  #           client-secret: ${KAKAO_CLIENT_SECRET}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
  #           authorization-grant-type: authorization_code
  #           client-authentication-method: client_secret_post
  #           scope: profile_nickname, account_email
  #         naver:
  #           client-id: ${NAVER_CLIENT_ID}
  #           client-secret: ${NAVER_CLIENT_SECRET}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/naver"
  #           authorization-grant-type: authorization_code
  #           scope: name, email, profile_image
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #           scope: profile, email
  #       provider:
  #         kakao:
  #           authorization-uri: https://kauth.kakao.com/oauth/authorize
  #           token-uri: https://kauth.kakao.com/oauth/token
  #           user-info-uri: https://kapi.kakao.com/v2/user/me
  #           user-name-attribute: id
  #         naver:
  #           authorization-uri: https://nid.naver.com/oauth2.0/authorize
  #           token-uri: https://nid.naver.com/oauth2.0/token
  #           user-info-uri: https://openapi.naver.com/v1/nid/me
  #           user-name-attribute: response

# --- JWT ---
jwt:
  # 운영 환경은 반드시 환경변수(JWT_SECRET)로 256bit 이상 랜덤 문자열을 주입한다.
  secret: ${JWT_SECRET:local-dev-secret-change-me-to-a-long-random-256bit-string-value}
  access-token-validity-seconds: ${JWT_ACCESS_TTL:3600}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.wedu: DEBUG
    org.hibernate.SQL: DEBUG
