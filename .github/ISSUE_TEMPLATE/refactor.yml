name: "♻️ 리팩터링 (Refactor)"
description: "기능 변경 없이 코드 구조를 개선합니다."
labels: ["refactor"]
body:
  - type: input
    id: domain
    attributes:
      label: 도메인
      description: "관련 도메인 패키지 (user / recommendation / product / proposal / planner / community)"
      placeholder: "예: planner"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: "무엇을 왜 리팩터링해야 하는지 간단히 설명합니다."
      placeholder: "~의 ~부분이 ~하므로 ~로 개선한다."
    validations:
      required: true

  - type: textarea
    id: as-is
    attributes:
      label: 현재 구조 (As-is)
      description: "현재 코드/구조의 문제점을 설명합니다."
    validations:
      required: true

  - type: textarea
    id: to-be
    attributes:
      label: 개선 구조 (To-be)
      description: "리팩터링 후 목표하는 구조를 설명합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: "세부 작업을 체크리스트로 작성합니다."
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: false
