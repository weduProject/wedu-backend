name: "✨ 기능 요청 (Feat)"
description: "새로운 기능을 제안합니다."
labels: ["feat"]
body:
  - type: input
    id: domain
    attributes:
      label: 도메인
      description: "관련 도메인 패키지 (user / recommendation / product / proposal / planner / community)"
      placeholder: "예: product"
    validations:
      required: true

  - type: input
    id: feature-id
    attributes:
      label: 기능 ID
      description: "WEDU 기능 번호 (해당 시)"
      placeholder: "예: WEDU-006"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: "어떤 기능을 왜 추가해야 하는지 간단히 설명합니다."
      placeholder: "사용자가 ~할 수 있도록 ~기능을 추가한다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: "구현에 필요한 세부 작업을 체크리스트로 작성합니다."
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: "관련 문서, 화면 설계, API 스펙 등이 있으면 첨부합니다."
      placeholder: "피그마 링크, ERD, 기획서 등"
    validations:
      required: false
