name: "🐛 버그 리포트 (Fix)"
description: "버그를 신고합니다."
labels: ["fix"]
body:
  - type: input
    id: domain
    attributes:
      label: 도메인
      description: "관련 도메인 패키지 (user / recommendation / product / proposal / planner / community)"
      placeholder: "예: user"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: "어떤 문제가 발생하는지 설명합니다."
      placeholder: "~할 때 ~가 발생한다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: "버그를 재현할 수 있는 단계를 작성합니다."
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: "정상적으로 동작해야 하는 결과를 설명합니다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: "현재 실제로 발생하는 결과를 설명합니다."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 스크린샷
      description: "에러 로그, 스택 트레이스, 스크린샷 등이 있으면 첨부합니다."
    validations:
      required: false
